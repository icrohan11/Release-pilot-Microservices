# =====================================================================
# SHARED CONFIGURATION - applied to every service that imports the
# Config Server. Service-specific files override these values.
# =====================================================================

# ----- Eureka (service discovery) -----
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ----- Common datasource (MySQL) -----
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ----- JWT (shared secret so gateway and services agree) -----
jwt.secret=ReleasePilotSecretKey2024@CTS@JFS@Secure
jwt.expiration=86400000
jwt.prefix=Bearer
jwt.header=Authorization

# ----- Gateway-injected identity headers -----
auth.header.user=X-Auth-User
auth.header.role=X-Auth-Role

# ----- Actuator -----
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ----- Logging (all logs written to a spring.log file per service) -----
logging.level.com.cts.releasepilot=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/spring.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ----- Swagger / OpenAPI -----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ----- Resilience4j default circuit breaker -----
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.configs.default.timeout-duration=4s

# Named circuit-breaker instances used by Feign wrappers (inherit the default config)
resilience4j.circuitbreaker.instances.product-service.base-config=default
resilience4j.circuitbreaker.instances.release-service.base-config=default
