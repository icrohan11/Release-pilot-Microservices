server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    # 'native' => read configuration from a local folder instead of Git
    active: native
  cloud:
    config:
      server:
        native:
          # Local folder (on the classpath) that contains all service configs
          search-locations: classpath:/config-repo

management:
  endpoints:
    web:
      exposure:
        include: health,info
