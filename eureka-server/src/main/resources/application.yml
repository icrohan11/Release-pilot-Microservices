server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # A standalone registry does not register with or fetch from itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    # Disable self-preservation in dev so dead instances are evicted quickly
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
